<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clarity EHR — Outpatient Behavioral Health</title>

    <!-- Open Graph / WhatsApp Preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Clarity EHR — Outpatient Behavioral Health" />
    <meta property="og:description" content="Comprehensive outpatient behavioral health EHR platform. HIPAA Compliant · EPCS Certified · ONC Certified · 42 CFR Part 2" />
    <meta property="og:image" content="https://app.clarity-ehr.com/og-image.png" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="720" />
    <meta property="og:url" content="https://app.clarity-ehr.com/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Clarity EHR — Outpatient Behavioral Health" />
    <meta name="twitter:description" content="Comprehensive outpatient behavioral health EHR platform." />
    <meta name="twitter:image" content="https://app.clarity-ehr.com/og-image.png" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0d2444" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Clarity" />
    <link rel="apple-touch-icon" href="/og-image.png" />
  </head>
  <body>
    <!-- Accessible no-JS fallback — hidden once React mounts -->
    <noscript>
      <style>
        #noscript-login { font-family: system-ui, sans-serif; max-width: 420px; margin: 80px auto; padding: 32px; background: #1e293b; border-radius: 16px; color: #f1f5f9; }
        #noscript-login h1 { font-size: 20px; margin: 0 0 6px; }
        #noscript-login p  { font-size: 13px; color: #94a3b8; margin: 0 0 20px; }
        #noscript-login label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 4px; }
        #noscript-login input { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #f1f5f9; font-size: 14px; margin-bottom: 14px; }
        #noscript-login button { width: 100%; padding: 11px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; }
        #noscript-login .warn { margin-top: 16px; padding: 12px; background: #451a03; border: 1px solid #92400e; border-radius: 8px; font-size: 12px; color: #fde68a; }
      </style>
      <main id="noscript-login" role="main">
        <h1>🧠 Clarity EHR — Staff Login</h1>
        <p>JavaScript is required for the full application. You can use the form below as a fallback.</p>
        <form method="POST" action="/api/auth/login">
          <label for="ns-username">Username</label>
          <input id="ns-username" type="text" name="username" autocomplete="username" required aria-required="true" placeholder="Enter your username" />
          <label for="ns-password">Password</label>
          <input id="ns-password" type="password" name="password" autocomplete="current-password" required aria-required="true" placeholder="Enter your password" />
          <button type="submit">Sign In</button>
        </form>
        <div class="warn" role="note">
          ⚠️ JavaScript is disabled in your browser. Enable JavaScript for the full HIPAA-compliant interface including multi-factor authentication and encrypted session management.
        </div>
      </main>
    </noscript>

    <!-- Skip-to-content link for keyboard users -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
