name: Fix Boolean Columns
on: workflow_dispatch
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Convert integer boolean columns to BOOLEAN and restart API
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DO_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $DO_HOST >> ~/.ssh/known_hosts

          cat << 'REMOTE_SCRIPT' | ssh $DO_USER@$DO_HOST bash
            set -e
            export $(grep -v '^#' /var/www/ehr/server/.env | grep DATABASE_URL)

            alter_bool_col() {
              local tbl=$1 col=$2 def=${3:-false}
              echo "--- $tbl.$col"
              psql "$DATABASE_URL" -c "ALTER TABLE $tbl ALTER COLUMN $col DROP DEFAULT" 2>/dev/null || true
              psql "$DATABASE_URL" -c "ALTER TABLE $tbl ALTER COLUMN $col TYPE BOOLEAN USING ${col}::int::boolean"
              psql "$DATABASE_URL" -c "ALTER TABLE $tbl ALTER COLUMN $col SET DEFAULT $def"
              echo "✅ $tbl.$col converted to BOOLEAN DEFAULT $def"
            }

            echo "=== Altering column types ==="
            alter_bool_col users two_factor_enabled false
            alter_bool_col users must_change_password false
            alter_bool_col patients is_btg false
            alter_bool_col patients is_active true
            alter_bool_col sessions is_active true
            alter_bool_col inbox_messages urgent false

            echo ""
            echo "=== Verify column types ==="
            psql "$DATABASE_URL" -c "SELECT table_name, column_name, data_type, column_default FROM information_schema.columns WHERE column_name IN ('two_factor_enabled','must_change_password','is_btg','urgent') ORDER BY table_name, column_name"

            echo ""
            echo "=== Null out provider on orphaned demo appointments (u1, u2) ==="
            psql "$DATABASE_URL" -c "
              UPDATE appointments SET provider = NULL, provider_name = provider_name || ' [removed]'
              WHERE provider IN ('u1','u2')
                AND NOT EXISTS (SELECT 1 FROM users WHERE id = appointments.provider);
            "

            echo ""
            echo "=== Backfill null location_id on appointments ==="
            psql "$DATABASE_URL" -c "
              UPDATE appointments a
              SET location_id = u.location_id
              FROM users u
              WHERE a.provider = u.id
                AND a.location_id IS NULL
                AND u.location_id IS NOT NULL;
              SELECT 'Rows updated: ' || COUNT(*) FROM appointments WHERE location_id IS NOT NULL;
            "

            echo ""
            echo "=== Restarting API ==="
            cd /var/www/ehr
            pm2 delete clarity-api 2>/dev/null || true
            pm2 start /var/www/ehr/ecosystem.config.cjs --env production
            pm2 save
            sleep 8
            pm2 list
            pm2 logs clarity-api --lines 20 --nostream
          REMOTE_SCRIPT
