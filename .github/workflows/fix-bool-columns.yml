name: Fix Boolean Columns
on: workflow_dispatch
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Convert integer boolean columns to BOOLEAN and restart API
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DO_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $DO_HOST >> ~/.ssh/known_hosts

          cat << 'REMOTE_SCRIPT' | ssh $DO_USER@$DO_HOST bash
            set -e
            export $(grep -v '^#' /var/www/ehr/server/.env | grep DATABASE_URL)

            echo "=== Altering column types ==="
            psql "$DATABASE_URL" -c "ALTER TABLE users ALTER COLUMN two_factor_enabled TYPE BOOLEAN USING two_factor_enabled::int::boolean" && echo "✅ two_factor_enabled" || echo "⚠️  two_factor_enabled (may already be BOOLEAN)"
            psql "$DATABASE_URL" -c "ALTER TABLE users ALTER COLUMN must_change_password TYPE BOOLEAN USING must_change_password::int::boolean" && echo "✅ must_change_password" || echo "⚠️  must_change_password (may already be BOOLEAN)"
            psql "$DATABASE_URL" -c "ALTER TABLE patients ALTER COLUMN is_btg TYPE BOOLEAN USING is_btg::int::boolean" && echo "✅ is_btg" || echo "⚠️  is_btg (may already be BOOLEAN)"
            psql "$DATABASE_URL" -c "ALTER TABLE inbox_messages ALTER COLUMN urgent TYPE BOOLEAN USING urgent::int::boolean" && echo "✅ urgent" || echo "⚠️  urgent (may already be BOOLEAN)"

            echo "=== Verify column types ==="
            psql "$DATABASE_URL" -c "SELECT table_name, column_name, data_type FROM information_schema.columns WHERE column_name IN ('two_factor_enabled','must_change_password','is_btg','urgent') ORDER BY table_name, column_name"

            echo "=== Restarting API ==="
            pm2 delete clarity-api 2>/dev/null || true
            pm2 start /var/www/ehr/ecosystem.config.cjs --env production
            pm2 save
            sleep 8
            pm2 list
            pm2 logs clarity-api --lines 20 --nostream
          REMOTE_SCRIPT
