name: Deploy to Production & Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Production
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DO_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $DO_HOST >> ~/.ssh/known_hosts

          ssh $DO_USER@$DO_HOST << 'EOF'
            cd /var/www/ehr
            git fetch origin
            git checkout main
            git pull origin main
            npm install --production
            pm2 restart ehr
            echo "✅ Production deployment complete"
          EOF

      - name: Verify API is up
        run: |
          sleep 5
          curl -f https://api.clarity-ehr.com/health || exit 1
          echo "✅ API is healthy"
