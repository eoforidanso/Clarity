name: Deploy to Production & Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Set up SSH
        env:
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          DO_HOST: ${{ secrets.DO_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$DO_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $DO_HOST >> ~/.ssh/known_hosts

      - name: Upload built frontend to server
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
        run: |
          rsync -az --delete dist/ $DO_USER@$DO_HOST:/var/www/ehr/dist/

      - name: Deploy backend and restart API
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
        run: |
          ssh $DO_USER@$DO_HOST << 'EOF'
            set -e
            cd /var/www/ehr
            git fetch origin
            git checkout main
            git reset --hard origin/main
            git clean -fd -e '.env' -e '.env.production' -e '.env.local'

            cd server
            npm ci --omit=dev
            cd ..

            pm2 restart ehr-api || pm2 start server/index.js --name ehr-api
            echo "✅ Production deployment complete"
          EOF

      - name: Verify API is up
        run: |
          sleep 10
          curl -f https://api.clarity-ehr.com/health || exit 1
          echo "✅ API is healthy"
