name: Clarity EHR — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 0. SERVER SYNTAX CHECK ────────────────────────────────────────────────────
  lint-server:
    name: Server Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check server JS syntax
        run: |
          echo "Checking server files for syntax errors..."
          find server -name "*.js" | while read f; do
            node --input-type=module < "$f" 2>&1 | grep -v "^$" || true
            node --check "$f" || { echo "❌ Syntax error in $f"; exit 1; }
          done
          echo "✅ All server files passed syntax check"

  # ── 1. BUILD ─────────────────────────────────────────────────────────────────
  build:
    name: Build Frontend
    needs: lint-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ github.ref == 'refs/heads/main' && secrets.VITE_API_URL || secrets.VITE_API_URL_STAGING }}

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
          retention-days: 1

  # ── 2a. DEPLOY → STAGING (develop branch) ───────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.clarity-ehr.com
    steps:
      - uses: actions/checkout@v4

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist

      - name: Deploy frontend → Cloudflare Pages (staging)
        run: npx wrangler pages deploy dist --project-name=clarity-ehr-staging --commit-message="staging" --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy backend → DO staging (port 5002)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          source: "server/routes/,server/middleware/,server/db/,server/security/,server/scripts/,server/index.js,server/config.js"
          target: /var/www/ehr/server-staging/

      - name: Restart staging API
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: pm2 restart ehr-api-staging --update-env

      - name: Health check staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            sleep 8
            curl -sf http://127.0.0.1:5002/api/health && echo "✅ Staging healthy" || exit 1

  # ── 2b. DEPLOY → PRODUCTION (main branch) ───────────────────────────────────
  deploy-production:
    name: Deploy → Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://app.clarity-ehr.com
    steps:
      - uses: actions/checkout@v4

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist

      - name: Deploy frontend → Cloudflare Pages (production)
        run: npx wrangler pages deploy dist --project-name=clarity-ehr --commit-message="deploy" --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy backend → DO production (port 5001)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          source: "server/routes/,server/middleware/,server/db/,server/security/,server/scripts/,server/index.js,server/config.js"
          target: /var/www/ehr/

      - name: Restart production API
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: pm2 restart ehr-api --update-env

      - name: Health check production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            for i in 1 2 3 4 5; do
              sleep 8
              curl -sf http://127.0.0.1:5001/api/health && echo "✅ Production healthy" && exit 0
              echo "Attempt $i failed, retrying..."
            done
            exit 1

  # ── 3. NOTIFY ────────────────────────────────────────────────────────────────
  notify:
    name: Summary
    needs: [deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY
          echo "| Target | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Staging    | ${{ needs.deploy-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Production | ${{ needs.deploy-production.result }} |" >> $GITHUB_STEP_SUMMARY
