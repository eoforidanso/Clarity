name: Deploy to Production & Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Production
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DO_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $DO_HOST >> ~/.ssh/known_hosts

          ssh $DO_USER@$DO_HOST << 'EOF'
            set -e
            cd /var/www/ehr
            git fetch origin
            git checkout main
            git reset --hard origin/main
            git clean -fd --exclude='.env*' --exclude='node_modules' --exclude='server/node_modules'

            # Install frontend deps and build
            npm install
            npm run build

            # Install backend deps
            cd server
            npm install --production
            cd ..

            # Restart API (process is named ehr-api)
            pm2 restart ehr-api
            echo "✅ Production deployment complete"
          EOF

      - name: Verify API is up
        run: |
          sleep 10
          curl -f https://api.clarity-ehr.com/health || exit 1
          echo "✅ API is healthy"
