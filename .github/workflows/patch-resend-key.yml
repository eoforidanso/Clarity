name: Patch Resend API Key

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Update RESEND_API_KEY on server
        run: |
          ssh -o StrictHostKeyChecking=no -i <(echo "$SSH_PRIVATE_KEY") root@$SERVER_IP bash << EOF
          set -e
          ENV_FILE=/var/www/ehr/server/.env
          NEW_KEY="$RESEND_KEY"

          if grep -q '^RESEND_API_KEY=' "\$ENV_FILE"; then
            sed -i "s|^RESEND_API_KEY=.*|RESEND_API_KEY=\$NEW_KEY|" "\$ENV_FILE"
            echo "Updated existing RESEND_API_KEY"
          else
            echo "RESEND_API_KEY=\$NEW_KEY" >> "\$ENV_FILE"
            echo "Appended RESEND_API_KEY"
          fi

          cd /var/www/ehr && pm2 restart clarity-api
          echo "PM2 restarted"

          KEY_VAL=\$(grep '^RESEND_API_KEY=' "\$ENV_FILE" | cut -d= -f2)
          echo "Key in .env now starts with: \${KEY_VAL:0:10}..."
          EOF
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          RESEND_KEY: ${{ secrets.RESEND_API_KEY }}
