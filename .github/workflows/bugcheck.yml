name: Bug Sweep

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ── Fast sweep: runs on every push, no server needed (~15s) ─────────────────
  fast-sweep:
    name: Static + Schema + Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run fast bug sweep
        run: node scripts/bugcheck.js --fast --verbose

  # ── Full sweep: runs only on PRs to main (needs live server) ─────────────────
  full-sweep:
    name: Full Sweep (with live API)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    env:
      NODE_ENV: test
      PORT: 5001
      JWT_SECRET: ci-only-not-a-real-secret-replace-in-prod
      DATABASE_URL: file:/tmp/ci-test.db
      CSRF_SECRET: ci-csrf-secret
      SESSION_SECRET: ci-session-secret
      API_BASE: http://localhost:5001
      TEST_USER: ${{ secrets.CI_TEST_USER }}
      TEST_PASS: ${{ secrets.CI_TEST_PASS }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install server dependencies
        working-directory: server
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts

      - name: Start test server
        run: |
          node server/index.js &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          # Wait for server to be ready
          for i in $(seq 1 20); do
            curl -sf -H 'CF-Visitor: {"scheme":"https"}' http://localhost:5001/api/health && break
            sleep 1
          done

      - name: Run full bug sweep
        run: node scripts/bugcheck.js --verbose

      - name: Stop test server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true
