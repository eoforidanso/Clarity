server.port=5001
spring.application.name=clarity-ehr

# ─── PostgreSQL ────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/clarity_ehr
spring.datasource.username=harrietappiah
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ─── Flyway Migrations ────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── JWT ───────────────────────────────────────────────
app.jwt.secret=clarity-ehr-secret-key-change-in-production-min-256-bits-long-enough
app.jwt.expiration-ms=28800000

# ─── CORS ──────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ─── Rate Limiting ─────────────────────────────────────
app.rate-limit.max-requests=1000
app.rate-limit.window-minutes=15

# ─── Server ────────────────────────────────────────────
spring.jackson.default-property-inclusion=non_null
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
