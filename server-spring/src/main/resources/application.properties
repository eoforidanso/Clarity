server.port=5001
spring.application.name=clarity-ehr

# ─── PostgreSQL ────────────────────────────────────────
# Use environment variables for credentials (never commit secrets!)
# Set via: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/clarity_ehr}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ─── Flyway Migrations ────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── JWT ───────────────────────────────────────────────
app.jwt.secret=tVrSG/ZdxqHkZZkuhWxKdmmzy4x/EwXQwt0fQ6kMRUk=
app.jwt.expiration-ms=28800000

# ─── CORS ──────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,https://*.clarity-ehr.pages.dev,https://clarity-ehr.pages.dev,https://app.clarity-ehr.com

# ─── Rate Limiting ─────────────────────────────────────
app.rate-limit.max-requests=1000
app.rate-limit.window-minutes=15

# ─── Server ────────────────────────────────────────────
spring.jackson.default-property-inclusion=non_null
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
